# Clog 프론트엔드 nginx 설정
#
# 역할:
# 1. React SPA 정적 파일 서빙 (/ → index.html)
# 2. SPA 라우팅 지원 (history fallback): /login, /profile 등 새로고침해도 index.html
# 3. /api/* 를 백엔드로 프록시 (접두어 /api 제거 → 방식 A)
#
# 백엔드 서비스: clog-dev (같은 dev 네임스페이스, 80 포트)

server {
    listen 80;
    server_name _;

    # gzip 압축
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── 정적 파일 루트 ──
    root /usr/share/nginx/html;
    index index.html;

    # ── API 프록시 (방식 A: /api 접두어 제거) ──
    # /api/auth/signup → 백엔드 /auth/signup
    location /api/ {
        # 끝의 / 가 핵심: /api/ 를 떼고 나머지를 백엔드 / 뒤에 붙임
        proxy_pass http://clog-dev:80/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 타임아웃
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # ── SPA history fallback ──
    # 정적 파일이 있으면 그대로, 없으면 index.html (React Router가 처리)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 정적 자산 캐싱 ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── health check (k8s probe 용) ──
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
