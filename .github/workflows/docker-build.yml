name: Docker Build & Push (Frontend)

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # miginho12/clog-frontend

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint
        continue-on-error: true

      - name: Type check (tsc)
        run: npx tsc -b --noEmit

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update GitOps image tag
        if: github.event_name != 'pull_request'
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          SHA_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          echo "Updating frontend values-dev.yaml image tag to ${SHA_TAG}"

          git clone https://x-access-token:${GITOPS_TOKEN}@github.com/miginho12/gitops.git /tmp/gitops
          cd /tmp/gitops

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          sed -i "s/^  tag: .*/  tag: \"${SHA_TAG}\"/" apps/clog-frontend/values-dev.yaml

          git add apps/clog-frontend/values-dev.yaml
          git diff --cached --quiet && echo "No changes, skipping commit" && exit 0
          git commit -m "chore: bump clog-frontend image tag to ${SHA_TAG}"
          git push

  notify-failure:
    needs: [test, build]
    if: always() && contains(needs.*.result, 'failure') && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord on CI failure
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -sf -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"❌ **clog-frontend** CI 실패 (${{ github.ref_name }})\\n커밋: \`${{ github.sha }}\`\\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
